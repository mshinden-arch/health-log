<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="https://icooon-mono.com/i/icon_11221/icon_112210.png">

<style>
    body { 
        font-family: 'Helvetica Neue', Arial, sans-serif; 
        background: #fdfaf5; display: flex; flex-direction: column; align-items: center; 
        padding: 0; margin: 0; color: #555; overflow-x: hidden;
        user-select: none; -webkit-user-select: none;
    }
    #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); z-index: 50; }
    
    /* ニューモーフィズムデザイン */
    .neuo-card { background: #fffefb; border-radius: 25px; box-shadow: 6px 6px 12px #f2efeb, -6px -6px 12px #ffffff; border: 1px solid rgba(255,255,255,0.5); }
    
    .header { padding: 20px; width: 85%; max-width: 350px; text-align: center; margin-top: 20px; z-index: 10; position: relative; }
    .streak-val { 
        font-size: 48px; font-weight: 900; 
        background: linear-gradient(135deg, #ffbc00, #ff5e3a);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin: 5px 0; display: inline-block;
    }
    
    /* アニメーション */
    @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .streak-animate { animation: jump 0.4s ease-out; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    .flash { animation: blink 1.5s infinite; }
    .status-bar { font-size: 11px; color: #888; margin-top: 5px; font-weight: bold; }

    .nav-area { display: flex; gap: 8px; margin: 15px 0; align-items: center; z-index: 10; }
    select { padding: 8px 15px; border-radius: 12px; border: none; font-size: 15px; background: #fffefb; box-shadow: inset 2px 2px 5px #f2efeb, inset -2px -2px 5px #ffffff; font-weight: bold; color: #555; }

    .calendar-container { width: 92%; max-width: 370px; padding: 15px 5px; margin-bottom: 20px; z-index: 10; }
    .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 12px; margin-bottom: 10px; color: #bbb; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    
    /* ★ズレ防止: 枠を縦に広く取り、スタンプが絶対にはみ出さないようにする★ */
    .day-box { 
        min-height: 65px; /* ここを十分に確保 */
        display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
        padding-top: 8px; font-size: 13px; cursor: pointer; position: relative; z-index: 1;
    }
    
    .day-box.connected::before { content: ''; position: absolute; top: 10%; bottom: 10%; left: -2px; right: -2px; background: rgba(255, 188, 0, 0.15); z-index: -1; }
    .day-box.conn-start::before { border-top-left-radius: 18px; border-bottom-left-radius: 18px; left: 3px; }
    .day-box.conn-end::before { border-top-right-radius: 18px; border-bottom-right-radius: 18px; right: 3px; }
    .day-box.conn-solo::before { border-radius: 18px; left: 3px; right: 3px; }
    
    .today { border: 2px solid #78b1ff; background: #eef6ff !important; border-radius: 12px; }
    .day-num { font-weight: bold; color: #777; z-index: 2; margin-bottom: 4px; }

    /* スタンプエリア */
    .stamps { 
        font-size: 16px; 
        min-height: 1.2em; 
        z-index: 2; 
        display: flex; 
        justify-content: center; 
        flex-wrap: wrap;
        gap: 1px;
        width: 100%;
    }

    /* 入力パネル */
    #inputPanel { 
        display: none; position: fixed; bottom: 0; left: 0; right: 0; 
        background: #fffefb; padding: 30px 20px 60px 20px; border-radius: 35px 35px 0 0;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.1); text-align: center; z-index: 100;
        animation: slideUp 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .panel-btn-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .panel-btn { 
        width: 100px; height: 85px; font-size: 16px; font-weight: bold; border-radius: 22px; border: none; color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    }
    .active-poop { border: 3px solid #a0522d !important; background: #fffefb !important; color: #a0522d !important; }
    .active-run { border: 3px solid #4cd964 !important; background: #fffefb !important; color: #4cd964 !important; }
    .active-rest { border: 3px solid #5ac8fa !important; background: #fffefb !important; color: #5ac8fa !important; }

    /* お祝い演出 */
    #celebration { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; pointer-events: none; }
    .congrats-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; text-align:center; z-index: 210; }
    .confetti { position: absolute; width: 8px; height: 8px; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    .gold-ring { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); border: 4px solid gold; border-radius: 50%; animation: ring-expand 1s ease-out forwards; }
    @keyframes ring-expand { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 500px; height: 500px; opacity: 0; } }
</style>
</head>
<body>

<div id="overlay" onclick="closePanel()"></div>
<div id="celebration"></div>

<div class="header neuo-card">
    <div style="font-size:11px; color:#aaa; font-weight:bold;">TOTAL STREAK</div>
    <div><span id="totalStreak" class="streak-val">0</span><span id="streakUnit" style="font-size:18px; font-weight:bold; color:#555;"> 日目</span></div>
    <div id="restStatus" class="status-bar">🏠 おやすみ残: 1回</div>
</div>

<div class="nav-area">
    <select id="yearSelect" onchange="renderCalendar()"></select>
    <select id="monthSelect" onchange="renderCalendar()"></select>
</div>

<div class="calendar-container neuo-card">
    <div class="weekday-header">
        <div style="color:#ff807b">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div style="color:#78b1ff">土</div>
    </div>
    <div id="calendar" class="calendar"></div>
</div>

<div id="inputPanel">
    <h3 id="selectedDateText" style="margin-top:0;">日付を選択</h3>
    <div class="panel-btn-container">
        <button id="poopBtnPanel" class="panel-btn" style="background:#a0522d;" onclick="toggleMark('poop')"><span>💩</span><span>うんこ</span></button>
        <button id="runBtnPanel" class="panel-btn" style="background:#4cd964;" onclick="toggleMark('run')"><span>🏃</span><span>運動</span></button>
        <button id="restBtnPanel" class="panel-btn" style="background:#5ac8fa;" onclick="toggleMark('rest')"><span>🏠</span><span>お休み</span></button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('healthLogData_TruePWA')) || {};
    const now = new Date();
    let selectedKey = null;

    function init() {
        const ySel = document.getElementById('yearSelect');
        const mSel = document.getElementById('monthSelect');
        for (let y = now.getFullYear()-1; y <= now.getFullYear()+1; y++) ySel.add(new Option(y+"年",y,y===now.getFullYear()));
        for (let m = 1; m <= 12; m++) mSel.add(new Option(m+"月",m,m===now.getMonth()+1));
        checkAutoRest();
        renderCalendar();
    }

    function checkAutoRest() {
        const yesterday = new Date(); yesterday.setDate(now.getDate()-1);
        const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
        if (!db[yKey] || (!db[yKey].run && !db[yKey].rest)) {
            const limit = getRestLimit(yesterday.getFullYear(), yesterday.getMonth()+1);
            if (getRestCount(yesterday.getFullYear(), yesterday.getMonth()+1) < limit) {
                if (!db[yKey]) db[yKey] = { poop:false, run:false, rest:false };
                db[yKey].rest = true; save();
            }
        }
    }

    function getRestLimit(y, m) {
        let py = y, pm = m - 1; if (pm === 0) { pm = 12; py--; }
        const days = new Date(py, pm, 0).getDate();
        let perfect = true, hasData = false;
        for (let d=1; d<=days; d++) {
            const k = `${py}-${pm}-${d}`; if (db[k]) hasData = true;
            if (!db[k] || !db[k].run) { perfect = false; break; }
        }
        return (perfect && hasData) ? 2 : 1;
    }

    function getRestCount(y, m) { return Object.keys(db).filter(k => k.startsWith(`${y}-${m}-`) && db[k].rest).length; }

    function renderCalendar() {
        const cal = document.getElementById('calendar'); cal.innerHTML = '';
        const y = parseInt(document.getElementById('yearSelect').value), m = parseInt(document.getElementById('monthSelect').value);
        const first = new Date(y, m-1, 1).getDay(), last = new Date(y, m, 0).getDate();
        for (let i=0; i<first; i++) cal.appendChild(document.createElement('div'));
        const dayEls = [];
        let todayDone = false;
        for (let d=1; d<=last; d++) {
            const key = `${y}-${m}-${d}`;
            const el = document.createElement('div'); el.className = 'day-box';
            const isToday = (y===now.getFullYear() && m===now.getMonth()+1 && d===now.getDate());
            if (isToday) el.classList.add('today');
            const log = db[key] || { poop:false, run:false, rest:false };
            if (isToday && (log.run || log.rest || log.poop)) todayDone = true;
            el.innerHTML = `<span class="day-num">${d}</span><div class="stamps">${(log.poop?'💩':'')}${(log.run?'🏃':'')}${(log.rest?'🏠':'')}</div>`;
            el.onclick = () => openPanel(key);
            cal.appendChild(el);
            dayEls[d] = { el, active: (log.run || log.rest) };
        }
        for (let d=1; d<=last; d++) {
            if (dayEls[d] && dayEls[d].active) {
                const prev = d > 1 && dayEls[d-1] && dayEls[d-1].active;
                const next = d < last && dayEls[d+1] && dayEls[d+1].active;
                dayEls[d].el.classList.add('connected');
                if (!prev && !next) dayEls[d].el.classList.add('conn-solo');
                else if (!prev) dayEls[d].el.classList.add('conn-start');
                else if (!next) dayEls[d].el.classList.add('conn-end');
            }
        }
        calculateTotal();
        const lim = getRestLimit(y, m);
        document.getElementById('restStatus').innerText = `🏠 おやすみ残: ${lim - getRestCount(y, m)} / ${lim}回`;
        
        // 未入力時点滅
        if(!todayDone) { 
            document.getElementById('totalStreak').classList.add('flash');
            document.getElementById('streakUnit').classList.add('flash');
        } else { 
            document.getElementById('totalStreak').classList.remove('flash'); 
            document.getElementById('streakUnit').classList.remove('flash');
        }
    }

    function calculateTotal() {
        let count = 0; Object.values(db).forEach(v => { if(v.run || v.rest) count++; });
        document.getElementById('totalStreak').innerText = count;
        return count;
    }

    function toggleMark(type) {
        if (!db[selectedKey]) db[selectedKey] = { poop:false, run:false, rest:false };
        if (type === 'rest' && !db[selectedKey].rest) {
            const p = selectedKey.split('-');
            if (getRestCount(p[0], p[1]) >= getRestLimit(p[0], p[1])) { alert("おやすみ上限です"); return; }
        }
        db[selectedKey][type] = !db[selectedKey][type];
        save(); renderCalendar();
        if ((type==='run'||type==='rest') && db[selectedKey][type]) {
            document.getElementById('totalStreak').classList.add('streak-animate');
            setTimeout(()=>document.getElementById('totalStreak').classList.remove('streak-animate'), 400);
            checkCelebration(calculateTotal());
        }
        setTimeout(closePanel, 300);
    }

    function checkCelebration(count) { 
        if (count > 0 && count % 25 === 0) {
            let level = (count % 100 === 0) ? 3 : (count % 50 === 0 ? 2 : 1);
            startCelebration(count, level); 
        }
    }

    function startCelebration(count, level) {
        const div = document.getElementById('celebration'); div.style.display = 'block';
        div.innerHTML = `<div class="congrats-text neuo-card" style="padding:20px; background:white;"><h2>${level===3?'LEGEND!':(level===2?'Amazing!':'Nice!')}</h2><h1>${count}日達成！</h1></div>`;
        if (level >= 2) { const ring = document.createElement('div'); ring.className = 'gold-ring'; div.appendChild(ring); }
        for (let i=0; i<level*40; i++) {
            const c = document.createElement('div'); c.className = 'confetti';
            c.style.cssText = `background:hsl(${Math.random()*360},80%,60%); left:${Math.random()*100}vw; top:-10px; animation:fall ${Math.random()*2+1}s linear forwards;`;
            div.appendChild(c);
        }
        setTimeout(() => { div.style.display='none'; }, 4000);
    }

    function openPanel(key) {
        selectedKey = key; document.getElementById('selectedDateText').innerText = key.replace(/-/g, '/');
        const log = db[key] || { poop:false, run:false, rest:false };
        document.getElementById('poopBtnPanel').className = 'panel-btn' + (log.poop?' active-poop':'');
        document.getElementById('runBtnPanel').className = 'panel-btn' + (log.run?' active-run':'');
        document.getElementById('restBtnPanel').className = 'panel-btn' + (log.rest?' active-rest':'');
        document.getElementById('inputPanel').style.display = 'block'; document.getElementById('overlay').style.display = 'block';
    }
    function closePanel() { document.getElementById('inputPanel').style.display='none'; document.getElementById('overlay').style.display='none'; }
    function save() { localStorage.setItem('healthLogData_TruePWA', JSON.stringify(db)); }
    init();
</script>
</body>
</html>
